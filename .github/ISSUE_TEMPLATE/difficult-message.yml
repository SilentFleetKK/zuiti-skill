name: 难回消息案例投稿
description: 投稿一条脱敏后的难回消息，帮助完善嘴替案例库
title: "[案例] "
labels: ["case", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢投稿。请务必脱敏，不要提交姓名、公司、手机号、地址、订单号、合同号等隐私信息。
  - type: dropdown
    id: relationship
    attributes:
      label: 关系类型
      options:
        - 老板/上级
        - 同事/平级
        - 甲方/客户/合作方
        - 家人/亲戚
        - 伴侣/暧昧对象
        - 前任
        - 朋友
        - 其他
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: 必要上下文
      description: 一两句话说明背景即可，请勿泄露隐私。
      placeholder: 例如：朋友三个月前借了我 2000 元，一直没还。
    validations:
      required: true
  - type: textarea
    id: message
    attributes:
      label: 对方消息
      description: 贴出难回的那条消息。建议转成文字，不要上传未脱敏截图。
      placeholder: 对方说：“……”
    validations:
      required: true
  - type: dropdown
    id: goal
    attributes:
      label: 你希望达成什么结果
      options:
        - 维持关系
        - 争取权益
        - 拒绝对方
        - 要钱/催款
        - 结束拉扯
        - 澄清责任
        - 不确定
    validations:
      required: true
  - type: dropdown
    id: intensity
    attributes:
      label: 希望回复力度
      options:
        - 体面
        - 绵里藏针
        - 掀桌
        - 不确定
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: 脱敏确认
      options:
        - label: 我已删除所有可识别个人、公司、订单、地址等隐私信息。
          required: true
